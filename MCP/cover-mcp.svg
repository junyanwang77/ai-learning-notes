<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="680" height="420" fill="url(#bg)"/>

  <!-- 装饰圆环 -->
  <circle cx="340" cy="190" r="160" fill="none" stroke="#3D1F7A" stroke-width="0.5"/>
  <circle cx="340" cy="190" r="120" fill="none" stroke="#5B21B6" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- 左侧用户节点 -->
  <circle cx="80" cy="190" r="48" fill="#1E1040" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="80" y="185" text-anchor="middle" fill="#C4B5FD" font-size="12" font-family="monospace">USER</text>
  <text x="80" y="202" text-anchor="middle" fill="#7C3AED" font-size="10" font-family="monospace">指令</text>

  <!-- 右侧工具节点 -->
  <circle cx="600" cy="190" r="48" fill="#1E1040" stroke="#5B2FB5" stroke-width="1"/>
  <text x="600" y="185" text-anchor="middle" fill="#9B7FE8" font-size="12" font-family="monospace">TOOLS</text>
  <text x="600" y="202" text-anchor="middle" fill="#5B2FB5" font-size="10" font-family="monospace">执行</text>

  <!-- 中央 Claude 核心 -->
  <circle cx="340" cy="190" r="68" fill="#1A0F38" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="340" y="180" text-anchor="middle" fill="#C4B5FD" font-size="14" font-family="monospace" font-weight="500">Claude</text>
  <text x="340" y="198" text-anchor="middle" fill="#7C3AED" font-size="10" font-family="monospace">MCP</text>
  <text x="340" y="213" text-anchor="middle" fill="#7C3AED" font-size="10" font-family="monospace">Protocol</text>

  <!-- 连接线 -->
  <line x1="130" y1="190" x2="270" y2="190" stroke="#7C3AED" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <line x1="412" y1="190" x2="550" y2="190" stroke="#7C3AED" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="5 3"/>

  <!-- 上方工具 VMark -->
  <rect x="290" y="60" width="100" height="32" rx="6" fill="#1E1040" stroke="#5B21B6" stroke-width="1"/>
  <text x="340" y="80" text-anchor="middle" dominant-baseline="central" fill="#C4B5FD" font-size="12" font-family="monospace">VMark</text>
  <line x1="340" y1="122" x2="340" y2="92" stroke="#5B21B6" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

  <!-- 下方工具 Codex -->
  <rect x="290" y="298" width="100" height="32" rx="6" fill="#1E1040" stroke="#5B21B6" stroke-width="1"/>
  <text x="340" y="318" text-anchor="middle" dominant-baseline="central" fill="#C4B5FD" font-size="12" font-family="monospace">Codex</text>
  <line x1="340" y1="258" x2="340" y2="298" stroke="#5B21B6" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

  <!-- 标签 -->
  <rect x="40" y="28" width="120" height="22" rx="4" fill="#2D1060"/>
  <text x="100" y="39" text-anchor="middle" dominant-baseline="central" fill="#9B7FE8" font-size="10" font-family="monospace">MCP · 实践笔记</text>

  <!-- 主标题 -->
  <text x="340" y="368" text-anchor="middle" fill="#EDE9FE" font-size="20" font-weight="500">我是怎么在一天内搞懂 MCP 的</text>

  <!-- 副标题 -->
  <text x="340" y="395" text-anchor="middle" fill="#6D28D9" font-size="12" font-family="monospace">Model Context Protocol · AI 协作新范式</text>

  <!-- 装饰点 -->
  <circle cx="580" cy="38" r="3" fill="#7C3AED"/>
  <circle cx="596" cy="38" r="3" fill="#5B21B6"/>
  <circle cx="612" cy="38" r="3" fill="#3D1F7A"/>
</svg>
